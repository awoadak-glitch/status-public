<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم AWR_WRT</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; text-align: center; padding: 20px; }
        .container { background: white; max-width: 500px; margin: auto; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        input { width: 80%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; text-align: center; }
        button { background-color: #007bff; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-size: 16px; transition: 0.3s; }
        button:hover { background-color: #0056b3; }
        #result { margin-top: 30px; display: none; border-top: 1px solid #eee; padding-top: 20px; }
        .device-img { width: 250px; height: auto; border-radius: 10px; margin-bottom: 15px; }
        .status-badge { padding: 5px 15px; border-radius: 20px; color: white; font-size: 14px; }
        .online { background-color: #28a745; }
        .offline { background-color: #dc3545; }
    </style>
</head>
<body>

<div class="container">
    <h2>الاستعلام عن جهاز AWR_WRT</h2>
    <p>أدخل الـ ID الخاص بجهازك لمعرفة الحالة</p>
    <input type="text" id="idInput" placeholder="مثلاً: 550e8400-e29b...">
    <br>
    <button onclick="checkDevice()">استعلام الآن</button>

    <div id="result">
        <img id="deviceImg" src="" class="device-img" alt="Device Image">
        <h3 id="modelName"></h3>
        <p>الإصدار الحالي: <span id="version"></span></p>
        <p>الحالة: <span id="statusBadge" class="status-badge"></span></p>
        <p id="updateMsg" style="color: #e67e22; font-weight: bold;"></p>
    </div>
</div>

<script>
    // مصفوفة الصور والموديلات
    const deviceCatalog = {
        "jcgq20": { name: "JCG Q20 AC1200", img: "assets/q20.png" },
        "generic": { name: "AWR Generic Device", img: "assets/generic.png" }
    };

    async function checkDevice() {
        const id = document.getElementById('idInput').value.trim();
        if (!id) return alert("يرجى إدخال المعرف");

        const resultDiv = document.getElementById('result');
        // يتم القراءة من مجلد data الذي يتم التزامن إليه
        const url = `data/${id}.json`;

        try {
            const response = await fetch(url);
            if (!response.ok) throw new Error("لم يتم العثور على بيانات لهذا الجهاز حالياً");

            const data = await response.json();
            
            // تعبئة البيانات
            const info = deviceCatalog[data.model] || deviceCatalog["generic"];
            document.getElementById('modelName').innerText = info.name;
            document.getElementById('deviceImg').src = info.img;
            document.getElementById('version').innerText = data.version;
            
            const badge = document.getElementById('statusBadge');
            badge.innerText = data.online ? "متصل" : "غير متصل";
            badge.className = `status-badge ${data.online ? 'online' : 'offline'}`;

            if(data.update_available) {
                document.getElementById('updateMsg').innerText = "⚠️ يوجد تحديث جديد متاح!";
            } else {
                document.getElementById('updateMsg').innerText = "";
            }

            resultDiv.style.display = "block";
        } catch (err) {
            alert(err.message);
            resultDiv.style.display = "none";
        }
    }
</script>
</body>
</html>
