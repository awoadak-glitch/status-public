<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWR_WRT | لوحة الاستعلام الذكية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #007bff;
            --accent-color: #00d4ff;
            --success-color: #2ecc71;
            --danger-color: #e74c3c;
            --warning-color: #f1c40f;
            --dark-bg: #0f172a;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--dark-bg);
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .main-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 90%;
            max-width: 480px;
            text-align: center;
        }

        h2 { font-weight: 700; margin-bottom: 5px; background: linear-gradient(to left, #fff, var(--accent-color)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p.subtitle { color: #94a3b8; font-size: 14px; margin-bottom: 25px; }

        input {
            width: 100%;
            padding: 16px;
            background: rgba(15, 23, 42, 0.6);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            color: white;
            font-size: 16px;
            text-align: center;
            outline: none;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }
        input:focus { border-color: var(--primary-color); box-shadow: 0 0 15px rgba(0, 123, 255, 0.3); }

        button {
            width: 100%;
            margin-top: 15px;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary-color), #0056b3);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        /* منطقة النتائج */
        #resultArea {
            display: none;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
            animation: fadeIn 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 20px 0;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.03);
            padding: 15px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .stat-label { display: block; font-size: 12px; color: #94a3b8; margin-bottom: 5px; }
        .stat-value { display: block; font-size: 16px; font-weight: 700; color: #f8fafc; }

        .device-img { width: 140px; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.3)); margin-bottom: 10px; }
        
        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 15px;
        }
        .online { background: rgba(46, 204, 113, 0.2); color: #2ecc71; border: 1px solid #2ecc71; }
        .offline { background: rgba(231, 76, 60, 0.2); color: #e74c3c; border: 1px solid #e74c3c; }

        .update-banner {
            background: rgba(241, 196, 15, 0.1);
            color: var(--warning-color);
            padding: 10px;
            border-radius: 10px;
            font-size: 13px;
            border: 1px dashed var(--warning-color);
            margin-top: 15px;
        }

        .sync-time { font-size: 11px; color: #64748b; margin-top: 15px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="main-card">
    <h2>AWR_WRT Smart Panel</h2>
    <p class="subtitle">نظام الاستعلام المباشر عن حالة أجهزة التوجيه</p>

    <input type="text" id="deviceId" placeholder="أدخل معرف الجهاز (ID)">
    <button id="searchBtn" onclick="initiateSearch()">تحليل البيانات</button>

    <div id="loader" style="display:none; margin-top: 20px;">
        <p style="color: var(--accent-color)">جاري جلب البيانات السحابية...</p>
    </div>

    <div id="resultArea">
        <div id="statusBadge" class="status-badge"></div>
        <br>
        <img id="resImg" src="" class="device-img" alt="Device">
        <h3 id="resModel" style="margin: 5px 0; letter-spacing: 1px;"></h3>
        
        <div class="stats-grid">
            <div class="stat-box">
                <span class="stat-label">الإصدار</span>
                <span class="stat-value" id="resVer"></span>
            </div>
            <div class="stat-box">
                <span class="stat-label">المستخدمين</span>
                <span class="stat-value" id="resUsers">0</span>
            </div>
            <div class="stat-box" style="grid-column: span 2;">
                <span class="stat-label">إجمالي استهلاك البيانات</span>
                <span class="stat-value" id="resUsage">0 MB</span>
            </div>
        </div>

        <div id="updateNotice" class="update-banner" style="display: none;">
            🔔 تحديث جديد متاح لنظامك الحالي
        </div>

        <div class="sync-time">آخر مزامنة: <span id="resSync">---</span></div>
    </div>
</div>

<script>
    async function initiateSearch() {
        const id = document.getElementById('deviceId').value.trim();
        const btn = document.getElementById('searchBtn');
        const loader = document.getElementById('loader');
        const resultArea = document.getElementById('resultArea');

        if (!id) return;

        resultArea.style.display = "none";
        loader.style.display = "block";
        btn.disabled = true;

        try {
            const response = await fetch(`data/${id}.json?t=${Date.now()}`, { cache: "no-store" });
            
            if (response.ok) {
                const data = await response.json();
                displayData(data);
            } else {
                alert("لم يتم العثور على بيانات لهذا المعرف.");
                resetUI();
            }
        } catch (err) {
            alert("خطأ في الاتصال بالخادم.");
            resetUI();
        }
    }

    function displayData(data) {
        document.getElementById('loader').style.display = "none";
        document.getElementById('searchBtn').disabled = false;
        
        // تعبئة البيانات الأساسية
        document.getElementById('resModel').innerText = data.model ? data.model.toUpperCase() : "AWR DEVICE";
        document.getElementById('resVer').innerText = data.version || "---";
        document.getElementById('resSync').innerText = data.last_sync || "غير متوفر";
        
        // تعبئة الإضافات الجديدة
        document.getElementById('resUsers').innerText = data.users_online || "0";
        document.getElementById('resUsage').innerText = (data.usage_total_mb || 0) + " MB";

        // حالة الاتصال
        const statusBadge = document.getElementById('statusBadge');
        statusBadge.innerText = data.online ? "متصل الآن" : "غير متصل";
        statusBadge.className = `status-badge ${data.online ? 'online' : 'offline'}`;

        // الصورة بناءً على الموديل
        const img = document.getElementById('resImg');
        img.src = data.model === "jcgq20" ? "assets/q20.png" : "assets/generic.png";

        // التحديث
        document.getElementById('updateNotice').style.display = data.update_available ? "block" : "none";

        document.getElementById('resultArea').style.display = "block";
    }

    function resetUI() {
        document.getElementById('loader').style.display = "none";
        document.getElementById('searchBtn').disabled = false;
    }
</script>

</body>
</html>
